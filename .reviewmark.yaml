# ReviewMark Configuration File
# This file defines which files require review, where the evidence store is located,
# and how files are grouped into named review-sets following software unit boundaries.
# Patterns identifying all files that require review.
# Processed in order; prefix a pattern with '!' to exclude.
needs-review:
  - '**/*.cs'  # All C# files
  - requirements.yaml  # Root requirements file
  - docs/reqstream/**/*.yaml  # All requirements files
  - docs/sysml2/**/*.sysml  # SysML2 architecture model
  - README.md  # Repository README
  - docs/user_guide/**/*.md  # User guide documents
  - docs/design/**/*.md  # All design documents
  - docs/verification/**/*.md  # All verification documents
  - '!**/obj/**'  # Exclude build output
  - '!**/bin/**'  # Exclude build output
# Evidence source: review data and index.json are located in the 'reviews' branch
# of this repository, accessed through the GitHub public HTTPS raw content access.
# Note: The 'reviews' branch must be created and populated with review evidence PDFs
# and an index.json before enforcement (--enforce flag) can be enabled in the pipeline.
evidence-source:
  type: url
  location: https://raw.githubusercontent.com/demaconsulting/VHDLTest/reviews/index.json
# Global context shown to every reviewer for orientation but not fingerprinted.
context:
  - docs/design/introduction.md
# Review sets grouping files by logical unit of review.
# Each review-set groups requirements, source, and tests for a coherent software unit
# so that an AI-assisted review can verify consistency across the full evidence chain.
reviews:
  # Purpose review - proves README and user guide are coherent and complete
  - id: Purpose
    title: Review that README and User Guide are Coherent and Complete
    paths:
      - README.md
      - docs/user_guide/**/*.md

  # Decomposition review - proves the software items tree addresses the stated purpose
  - id: Decomposition
    title: Review that VHDLTest Decomposition Addresses the Stated Purpose
    context: [README.md, docs/user_guide/**/*.md]
    paths:
      - requirements.yaml
      - docs/design/introduction.md
      - docs/sysml2/**/*.sysml

  # System-level architecture review
  - id: VHDLTest-Architecture
    title: Review that VHDLTest Architecture Satisfies Requirements
    context: [README.md, docs/user_guide/**/*.md]
    paths:
      - docs/reqstream/vhdltest/vhdltest.yaml
      - docs/design/introduction.md
      - docs/design/vhdltest.md
      - docs/verification/introduction.md
      - docs/verification/vhdltest.md
      - test/**/IntegrationTests.cs

  # Design review
  - id: VHDLTest-Design
    title: Review that VHDLTest Design is Consistent and Complete
    context: [docs/reqstream/vhdltest/vhdltest.yaml]
    paths:

# Requirements Testing Strategy
#
# This project uses three categories of tests to verify requirements:
#
# 1. Unit Tests - Run locally via "dotnet test"
# 2. Self-Validation Tests - Run locally via "--validate"
# 3. Platform Tests - Run via CI/CD across OS/runtime matrix
#
# NOTE: Running "reqstream --enforce" with only local test results (unit tests
# and local self-validation) is expected to show some unsatisfied requirements.
# Platform-specific requirements require test results from CI/CD runs across
# the full OS and runtime matrix.
#
# Test links can include a source filter prefix (e.g. "windows@", "ghdl@", "dotnet8.x@")
# to restrict which test results count as evidence for a requirement. This is critical for
# platform, simulator, and framework requirements - removing these filters invalidates the
# evidence-based proof.
#
# Source filter prefixes:
#   ghdl@TestName       - proves the test passed using the GHDL simulator
#   nvc@TestName        - proves the test passed using the NVC simulator
#   windows@TestName    - proves the test passed on a Windows platform
#   ubuntu@TestName     - proves the test passed on a Linux (Ubuntu) platform
#   macos@TestName      - proves the test passed on a macOS platform
#   dotnet8.x@TestName  - proves the self-validation test ran with .NET 8.x runtime
#   dotnet9.x@TestName  - proves the self-validation test ran with .NET 9.x runtime
#   dotnet10.x@TestName - proves the self-validation test ran with .NET 10.x runtime
#
---
sections:
  - title: VHDLTest Requirements
    sections:
      - title: Command-Line Interface
        requirements:
          - id: VHDLTest-Cmd-Usage
            title: VHDLTest shall display usage information when run without arguments.
            justification: |
              Provides immediate guidance to users who are unfamiliar with the tool or have
              forgotten the command syntax. This improves user experience by making the tool
              self-documenting and reduces the need for external documentation lookups.
            tests:
              - IntegrationTest_NoArguments_DisplaysUsageAndReturnsError

          - id: VHDLTest-Cmd-Version
            title: VHDLTest shall display version information when requested.
            justification: |
              Enables users to verify which version of VHDLTest is installed, which is critical
              for troubleshooting, compatibility checks, and ensuring reproducible builds. This
              is a standard practice for CLI tools and supports issue reporting.
            tests:
              - IntegrationTest_VersionShortFlag_DisplaysVersionAndReturnsSuccess
              - IntegrationTest_VersionLongFlag_DisplaysVersionAndReturnsSuccess

          - id: VHDLTest-Cmd-Help
            title: VHDLTest shall display help information when requested.
            justification: |
              Provides comprehensive command-line documentation directly within the tool,
              allowing users to quickly reference available options and syntax without
              consulting external documentation. Supports multiple help flags for user convenience.
            tests:
              - IntegrationTest_HelpShortFlag_DisplaysUsageAndReturnsSuccess
              - IntegrationTest_HelpQuestionFlag_DisplaysUsageAndReturnsSuccess
              - IntegrationTest_HelpLongFlag_DisplaysUsageAndReturnsSuccess

      - title: Test Execution
        requirements:
          - id: VHDLTest-Test-Success
            title: VHDLTest shall execute VHDL test benches and return zero exit code on success.
            justification: |
              Enables integration with CI/CD pipelines and build systems that rely on exit
              codes to determine test success or failure. A zero exit code is the standard
              convention for successful command execution in Unix-like systems.
            tests:
              - IntegrationTest_TestsPassed_ReturnsZeroExitCode

          - id: VHDLTest-Test-CompileError
            title: VHDLTest shall return non-zero exit code when compilation fails.
            justification: |
              Allows CI/CD systems and automated workflows to detect compilation errors and
              halt the build process appropriately. This prevents invalid or incomplete designs
              from progressing through the development pipeline.
            tests:
              - IntegrationTest_CompileError_ReturnsNonZeroExitCode

          - id: VHDLTest-Test-TestError
            title: VHDLTest shall return non-zero exit code when tests fail.
            justification: |
              Enables automated test environments to detect test failures and take appropriate
              action (e.g., failing the build, sending notifications). This is essential for
              continuous integration and maintaining code quality.
            tests:
              - IntegrationTest_TestExecutionError_ReturnsNonZeroExitCode

          - id: VHDLTest-Test-Exit0
            title: VHDLTest shall support exit-0 mode to always return zero exit code.
            justification: |
              Provides flexibility for scenarios where test results need to be collected and
              analyzed without failing the build process. Useful for generating test reports
              in pipelines where failures are handled by separate post-processing steps.
            tests:
              - IntegrationTest_TestExecutionErrorWithExit0_ReturnsZeroExitCode

      - title: Validation
        requirements:
          - id: VHDLTest-Val-Validate
            title: VHDLTest shall support self-validation mode.
            justification: |
              Enables users to verify that VHDLTest is correctly installed and configured in
              their environment. This diagnostic capability helps identify configuration issues
              before running actual test suites, reducing troubleshooting time.
            tests:
              - IntegrationTest_ValidateFlag_PerformsValidationAndReturnsSuccess

          - id: VHDLTest-Val-Depth
            title: VHDLTest shall support configurable validation report depth.
            justification: |
              Enables control of markdown header depth in validation reports when embedding the
              validation output in other documents. This ensures proper document hierarchy and
              formatting when validation reports are included as sections in larger documents.
            tests:
              - IntegrationTest_ValidateFlagWithDepth_PerformsValidationWithDepth

          - id: VHDLTest-Val-Results
            title: VHDLTest shall save validation results to file.
            justification: |
              Enables persistent storage of validation results for documentation, compliance,
              and historical comparison purposes. Saved reports can be shared with team members
              or included in bug reports for support.
            tests:
              - IntegrationTest_ValidateFlagWithResultsFile_SavesValidationResults

          - id: VHDLTest-Val-SystemInfo
            title: VHDLTest shall include system information in validation reports.
            justification: |
              Provides essential context for validation results by capturing the execution
              environment (OS version, runtime, etc.). This information is crucial for
              reproducing issues and diagnosing environment-specific problems.
            tests:
              - IntegrationTest_ValidateFlag_IncludesOSVersionInReport

      - title: Simulator Support
        requirements:
          - id: VHDLTest-Sim-GHDL
            title: VHDLTest shall support the GHDL simulator.
            justification: |
              GHDL is the most widely-used open-source VHDL simulator and is essential for
              teams working with free and open-source toolchains. Supporting GHDL enables
              cost-effective VHDL development and testing without commercial licenses.
            tests:
              - SimulatorFactory_Get_GhdlSimulator_ReturnsGhdlSimulator
              - GhdlSimulator_SimulatorName_ReturnsGHDL
              - ghdl@VHDLTest_TestPasses
              - ghdl@VHDLTest_TestFails

          - id: VHDLTest-Sim-ModelSim
            title: VHDLTest shall support the ModelSim simulator.
            justification: |
              ModelSim is an industry-standard commercial VHDL simulator widely used in
              professional FPGA and ASIC development. Support for ModelSim is critical for
              enterprise users and teams with existing ModelSim-based workflows.
            tests:
              - SimulatorFactory_Get_ModelSimSimulator_ReturnsModelSimSimulator
              - ModelSimSimulator_SimulatorName_ReturnsModelSim

          - id: VHDLTest-Sim-QuestaSim
            title: VHDLTest shall support the QuestaSim simulator.
            justification: |
              QuestaSim is the advanced verification tool from Siemens/Mentor Graphics, offering
              enhanced debugging and coverage features. Supporting QuestaSim enables VHDLTest
              to integrate with high-end verification environments.
            tests:
              - SimulatorFactory_Get_QuestaSimSimulator_ReturnsQuestaSimSimulator
              - QuestaSimSimulator_SimulatorName_ReturnsQuestaSim

          - id: VHDLTest-Sim-Vivado
            title: VHDLTest shall support the Vivado simulator.
            justification: |
              Vivado is Xilinx's primary design suite and simulator for their FPGA products.
              Supporting Vivado simulator is essential for teams developing designs targeting
              Xilinx/AMD FPGAs and enables seamless integration with the Vivado toolchain.
            tests:
              - SimulatorFactory_Get_VivadoSimulator_ReturnsVivadoSimulator
              - VivadoSimulator_SimulatorName_ReturnsVivado

          - id: VHDLTest-Sim-ActiveHDL
            title: VHDLTest shall support the ActiveHDL simulator.
            justification: |
              Active-HDL from Aldec is a popular VHDL simulator particularly in the aerospace
              and defense industries. Supporting Active-HDL ensures VHDLTest can be used in
              regulated environments and specialized application domains.
            tests:
              - SimulatorFactory_Get_ActiveHDLSimulator_ReturnsActiveHDLSimulator
              - ActiveHdlSimulator_SimulatorName_ReturnsActiveHDL

          - id: VHDLTest-Sim-NVC
            title: VHDLTest shall support the NVC simulator.
            justification: |
              NVC is a modern, fast open-source VHDL simulator with good standards compliance.
              Supporting NVC provides users with an alternative open-source option that offers
              better performance than GHDL in certain scenarios and supports newer VHDL standards.
            tests:
              - SimulatorFactory_Get_NVCSimulator_ReturnsNVCSimulator
              - NvcSimulator_SimulatorName_ReturnsNVC
              - nvc@VHDLTest_TestPasses
              - nvc@VHDLTest_TestFails

      - title: Platform Support
        requirements:
          - id: VHDLTest-Plt-Linux
            title: VHDLTest shall run on Linux operating systems.
            justification: |
              Linux is the dominant platform for FPGA/ASIC development and continuous integration
              environments. Supporting Linux ensures VHDLTest can be used in CI/CD pipelines and
              on the primary development platform for embedded systems and hardware design.
            tests:
              - ubuntu@VHDLTest_TestPasses
              - ubuntu@VHDLTest_TestFails

          - id: VHDLTest-Plt-Windows
            title: VHDLTest shall run on Windows operating systems.
            justification: |
              Windows is widely used in corporate environments and for desktop-based FPGA
              development. Supporting Windows ensures VHDLTest is accessible to the broadest
              possible user base including enterprise users with Windows-standardized environments.
            tests:
              - windows@VHDLTest_TestPasses
              - windows@VHDLTest_TestFails

          - id: VHDLTest-Plt-MacOS
            title: VHDLTest shall run on macOS operating systems.
            justification: |
              macOS is widely used by developers working in Apple ecosystems and for desktop-based
              FPGA development. Supporting macOS ensures VHDLTest is accessible to the broadest
              possible user base including developers using Apple hardware.
            tests:
              # Tests link to "macos" to ensure results come from macOS platform
              - macos@VHDLTest_TestPasses
              - macos@VHDLTest_TestFails

          - id: VHDLTest-Plt-Net8
            title: VHDLTest shall support .NET 8.0 runtime.
            justification: |
              .NET 8.0 is a Long-Term Support (LTS) release supported until November 2026.
              Supporting this LTS version ensures stability and long-term usability for users
              who require extended support lifecycles in production environments.
            tests:
              - dotnet8.x@VHDLTest_TestPasses
              - dotnet8.x@VHDLTest_TestFails

          - id: VHDLTest-Plt-Net9
            title: VHDLTest shall support .NET 9.0 runtime.
            justification: |
              .NET 9.0 is a Standard Term Support (STS) release that provides access to the
              latest .NET features and performance improvements. Supporting .NET 9.0 enables
              users to leverage modern runtime capabilities while it remains in support.
            tests:
              - dotnet9.x@VHDLTest_TestPasses
              - dotnet9.x@VHDLTest_TestFails

          - id: VHDLTest-Plt-Net10
            title: VHDLTest shall support .NET 10.0 runtime.
            justification: |
              .NET 10.0 is the upcoming Long-Term Support (LTS) release scheduled for November
              2025. Supporting .NET 10.0 ensures VHDLTest remains compatible with the latest
              long-term supported runtime and benefits from future performance and security updates.
            tests:
              - dotnet10.x@VHDLTest_TestPasses
              - dotnet10.x@VHDLTest_TestFails

  - title: OTS Software
    requirements:
      - id: VHDLTest-OTS-MSTest
        title: MSTest shall execute unit tests and report results.
        justification: |
          MSTest (MSTest.TestFramework and MSTest.TestAdapter) is the unit-testing framework used
          by the project. It discovers and runs all test methods and writes TRX result files that
          feed into coverage reporting and requirements traceability. Passing tests confirm the
          framework is functioning correctly.
        tags: [ots]
        tests:
          - SimulatorFactory_Get_GhdlSimulator_ReturnsGhdlSimulator
          - GhdlSimulator_SimulatorName_ReturnsGHDL

      - id: VHDLTest-OTS-ReqStream
        title: ReqStream shall enforce that every requirement is linked to passing test evidence.
        justification: |
          DemaConsulting.ReqStream processes requirements.yaml and the TRX test-result files to
          produce a requirements report, justifications document, and traceability matrix. When
          run with --enforce, it exits with a non-zero code if any requirement lacks test evidence,
          making unproven requirements a build-breaking condition.
        tags: [ots]
        tests:
          - ReqStream_EnforcementMode

      - id: VHDLTest-OTS-BuildMark
        title: BuildMark shall generate build-notes documentation from GitHub Actions metadata.
        justification: |
          DemaConsulting.BuildMark queries the GitHub API to capture workflow run details and
          renders them as a markdown build-notes document included in the release artifacts.
        tags: [ots]
        tests:
          - BuildMark_MarkdownReportGeneration

      - id: VHDLTest-OTS-VersionMark
        title: VersionMark shall publish captured tool-version information.
        justification: |
          DemaConsulting.VersionMark reads version metadata for each dotnet tool used in the
          pipeline and writes a versions markdown document included in the release artifacts.
        tags: [ots]
        tests:
          - VersionMark_CapturesVersions
          - VersionMark_GeneratesMarkdownReport

      - id: VHDLTest-OTS-SarifMark
        title: SarifMark shall convert CodeQL SARIF results into a markdown report.
        justification: |
          DemaConsulting.SarifMark reads the SARIF output produced by CodeQL code scanning and
          renders it as a human-readable markdown document included in the release artifacts.
        tags: [ots]
        tests:
          - SarifMark_SarifReading
          - SarifMark_MarkdownReportGeneration

      - id: VHDLTest-OTS-SonarMark
        title: SonarMark shall generate a SonarCloud quality report.
        justification: |
          DemaConsulting.SonarMark retrieves quality-gate and metrics data from SonarCloud and
          renders it as a markdown document included in the release artifacts.
        tags: [ots]
        tests:
          - SonarMark_QualityGateRetrieval
          - SonarMark_IssuesRetrieval
          - SonarMark_HotSpotsRetrieval
          - SonarMark_MarkdownReportGeneration

---
sections:
  - title: VHDLTest Requirements
    sections:
      - title: Run Requirements
        requirements:
          - id: VHDLTest-Run-Execute
            title: VHDLTest shall execute the configured simulator program for each test bench invocation.
            justification: |
              Executing the simulator as an external process allows VHDLTest to work with any
              command-line VHDL simulator without requiring programmatic integration.
            tests:
              - RunSubsystem_ExecuteRealProgram_WithClassificationRules_ProducesClassifiedRunResults
            children:
              - VHDLTest-Run-RunProcessor-MissingProgram
              - VHDLTest-Run-RunProcessor-ExitCodeFail
              - VHDLTest-Run-RunProgram-Execute
              - VHDLTest-Run-RunProgram-Output
              - VHDLTest-Run-RunResults-SummaryElevation

          - id: VHDLTest-Run-Execute-ExitCode
            title: VHDLTest shall use the simulator program's exit code to determine whether the test run succeeded or failed.
            justification: |
              Capturing the exit code provides the primary signal for whether the simulator
              reported an error, ensuring that non-zero exit codes are never silently ignored
              even when no individual output line matches an error pattern.
            tests:
              - RunSubsystem_ExecuteRealProgram_WithErrorExitCode_ProducesErrorRunResults

          - id: VHDLTest-Run-Log
            title: VHDLTest shall log the working directory and run command to the context before executing the simulator program.
            justification: |
              Logging the working directory and command before execution gives users and CI
              operators the information needed to reproduce and diagnose simulator invocation
              issues without external process tracing tools.
            tests:
              - RunSubsystem_Execute_WithContext_LogsWorkingDirectoryAndCommandToContext
            children:
              - VHDLTest-Run-RunProcessor-VerboseLogging
              - VHDLTest-Run-RunProcessor-VerboseLogging-Command

          - id: VHDLTest-Run-Classify
            title: >-
              VHDLTest shall classify each simulator output line by matching it against configurable
              regex rules, assigning the first matching rule's type or Text when no rule matches.
            justification: |
              Pattern-based classification of output lines allows each simulator integration to
              define its own output rules without changing the core execution logic, making it
              straightforward to add support for new simulators or update patterns when simulator
              output formats change.
            tests:
              - RunSubsystem_ExecuteRealProgram_WithClassificationRules_ProducesClassifiedRunResults
              - RunSubsystem_ExecuteRealProgram_WithErrorExitCode_ProducesErrorRunResults
              - RunSubsystem_ExecuteNoRules_FallsBackToTextClassification
            children:
              - VHDLTest-Run-RunProcessor-Pass
              - VHDLTest-Run-RunProcessor-Fail
              - VHDLTest-Run-RunResults-Print
              - VHDLTest-Run-RunResults-VerboseSuppression
              - VHDLTest-Run-RunLineRule-Classify
              - VHDLTest-Run-RunLine
              - VHDLTest-Run-RunLineType

---
sections:
  - title: VHDLTest Requirements
    sections:
      - title: Simulators Requirements
        sections:
          - title: Simulator Requirements
            requirements:
              - id: VHDLTest-Simulators-Simulator-Interface
                title: >-
                  All simulator integrations shall expose a uniform compilation and
                  test-execution interface so that the rest of VHDLTest can invoke any
                  supported simulator without knowledge of the specific simulator being used.
                justification: |
                  A uniform interface decouples the core run logic from simulator-specific
                  details, enabling VHDLTest to support multiple simulators -- GHDL, NVC,
                  ModelSim, QuestaSim, Vivado, Active-HDL -- without modifying the execution
                  pipeline. This also makes it straightforward to add new simulator
                  integrations in the future.
                tests:
                  - MockSimulator_SimulatorName_ReturnsMock
                  - MockSimulator_Available_WithNullPath_ReturnsFalse
                  - MockSimulator_Compile_WithCleanFile_ReturnsSuccessResult
                  - MockSimulator_Test_WithCleanName_ReturnsSuccessResult

              - id: VHDLTest-Simulators-Simulator-Where
                title: >-
                  VHDLTest shall locate a simulator executable by searching the system PATH at
                  runtime.
                justification: |
                  Runtime PATH-based discovery lets VHDLTest use simulator installations without
                  requiring users to hard-code absolute paths for every environment.
                tests:
                  - Simulator_Where_ExistingExecutable_ReturnsNonNull

              - id: VHDLTest-Simulators-Simulator-Where-NotFound
                title: >-
                  VHDLTest shall return null when a simulator executable cannot be found on the
                  system PATH.
                justification: |
                  Returning null when an executable is unavailable lets callers report a clear
                  installation problem instead of proceeding with an invalid path.
                tests:
                  - Simulator_Where_UnknownExecutable_ReturnsNull

---
sections:
  - title: VHDLTest Requirements
    sections:
      - title: Simulators Requirements
        sections:
          - title: GhdlSimulator Requirements
            requirements:
              - id: VHDLTest-Simulators-GhdlSimulator-Support
                title: VHDLTest shall support the GHDL simulator.
                justification: |
                  GHDL is the most widely-used open-source VHDL simulator and is essential for
                  teams working with free and open-source toolchains. Supporting GHDL enables
                  cost-effective VHDL development and testing without commercial licenses.
                tests:
                  - GhdlSimulator_SimulatorName_ReturnsGHDL
                  - SimulatorFactory_Get_GhdlSimulator_ReturnsGhdlSimulator
                  # CI integration tests (run in GHDL-installed environments):
                  # - ghdl@VHDLTest_TestPasses
                  # - ghdl@VHDLTest_TestFails

              - id: VHDLTest-Simulators-GhdlSimulator-Compile
                title: GhdlSimulator shall classify GHDL compilation output lines by severity.
                justification: |
                  Accurate classification of compilation output enables VHDLTest to detect
                  warnings and errors during the analysis phase and report them clearly to
                  the user.
                tests:
                  - GhdlSimulator_CompileProcessor_CleanOutput_ReturnsTextResult
                  - GhdlSimulator_CompileProcessor_WarningOutput_ReturnsWarningResult
                  - GhdlSimulator_CompileProcessor_ErrorOutput_ReturnsErrorResult

              - id: VHDLTest-Simulators-GhdlSimulator-Test
                title: GhdlSimulator shall classify GHDL simulation output lines by severity.
                justification: |
                  Accurate classification of simulation output enables VHDLTest to detect pass,
                  warning, and error conditions during test bench execution and reflect them
                  in the test report.
                tests:
                  - GhdlSimulator_TestProcessor_CleanOutput_ReturnsTextResult
                  - GhdlSimulator_TestProcessor_InfoOutput_ReturnsInfoResult
                  - GhdlSimulator_TestProcessor_WarningOutput_ReturnsWarningResult
                  - GhdlSimulator_TestProcessor_ErrorOutput_ReturnsErrorResult

              - id: VHDLTest-Simulators-GhdlSimulator-FindPath
                title: >-
                  GhdlSimulator shall locate the GHDL installation directory, respecting the
                  VHDLTEST_GHDL_PATH environment variable override when set.
                justification: |
                  Reliable path discovery ensures VHDLTest can locate GHDL across different
                  installation layouts and environments. The VHDLTEST_GHDL_PATH environment
                  variable override enables CI pipelines and non-standard installations to
                  specify the GHDL path explicitly without modifying PATH.
                tests:
                  - GhdlSimulator_FindPath_WithEnvVar_ReturnsEnvVarValue
                  - GhdlSimulator_FindPath_WithoutEnvVar_ReturnsNullOrPath

              - id: VHDLTest-Simulators-GhdlSimulator-Availability
                title: The GhdlSimulator shall throw InvalidOperationException when Compile or Test is invoked and the GHDL simulator is not available.
                justification: |
                  Failing fast with a descriptive exception when the simulator is unavailable
                  prevents silent incorrect behavior and gives callers a clear signal that the
                  GHDL installation is missing. Callers are expected to check Available() before
                  invoking Compile or Test.
                tests:
                  - GhdlSimulator_Compile_WhenNotAvailable_ThrowsInvalidOperationException
                  - GhdlSimulator_Test_WhenNotAvailable_ThrowsInvalidOperationException

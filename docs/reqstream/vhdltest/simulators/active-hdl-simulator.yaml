---
sections:
  - title: VHDLTest Requirements
    sections:
      - title: Simulators Requirements
        sections:
          - title: ActiveHdlSimulator Requirements
            requirements:
              - id: VHDLTest-Simulators-ActiveHdlSimulator-Support
                title: VHDLTest shall support the ActiveHDL simulator.
                justification: |
                  Active-HDL from Aldec is a popular VHDL simulator particularly in the aerospace
                  and defense industries. Supporting Active-HDL ensures VHDLTest can be used in
                  regulated environments and specialized application domains.
                tests:
                  - ActiveHdlSimulator_SimulatorName_ReturnsActiveHDL

              - id: VHDLTest-Simulators-ActiveHdlSimulator-Compile
                title: ActiveHdlSimulator shall classify Active-HDL compilation output lines by severity.
                justification: |
                  Accurate classification of compilation output enables VHDLTest to detect
                  warnings and errors during the analysis phase and report them clearly to
                  the user.
                tests:
                  - ActiveHdlSimulator_CompileProcessor_CleanOutput_ReturnsTextResult
                  - ActiveHdlSimulator_CompileProcessor_WarningOutput_ReturnsWarningResult
                  - ActiveHdlSimulator_CompileProcessor_ErrorOutput_ReturnsErrorResult

              - id: VHDLTest-Simulators-ActiveHdlSimulator-Test
                title: ActiveHdlSimulator shall classify Active-HDL simulation output lines by severity.
                justification: |
                  Accurate classification of simulation output enables VHDLTest to detect pass,
                  warning, and error conditions during test bench execution and reflect them
                  in the test report.
                tests:
                  - ActiveHdlSimulator_TestProcessor_CleanOutput_ReturnsTextResult
                  - ActiveHdlSimulator_TestProcessor_InfoOutput_ReturnsInfoResult
                  - ActiveHdlSimulator_TestProcessor_WarningOutput_ReturnsWarningResult
                  - ActiveHdlSimulator_TestProcessor_ErrorOutput_ReturnsErrorResult

              - id: VHDLTest-Simulators-ActiveHdlSimulator-TestScript
                title: ActiveHdlSimulator shall append exit -code 0 to the TCL test script to signal successful completion.
                justification: |
                  The vsimsa batch-mode tool does not emit a success exit code automatically when
                  simulation completes. Appending exit -code 0 ensures that a successful simulation
                  run is distinguished from a run that terminated abnormally without an exit code.
                tests:
                  - ActiveHdlSimulator_Test_WithCleanConfig_AppendsTclExitCode

              - id: VHDLTest-Simulators-ActiveHdlSimulator-LatticeSuppression
                title: ActiveHdlSimulator shall suppress Active-HDL Lattice Edition license advisory messages from test output.
                justification: |
                  Active-HDL Lattice Edition emits license advisory warnings on every run that
                  are not indicative of VHDL design issues. Suppressing these prevents false
                  positive diagnostic results that would confuse users and obscure genuine warnings.
                tests:
                  - ActiveHdlSimulator_TestProcessor_LatticeSuppression1_ReturnsTextResult
                  - ActiveHdlSimulator_TestProcessor_LatticeSuppression2_ReturnsTextResult


---
sections:
  - title: VHDLTest Requirements
    sections:
      - title: Simulators Requirements
        sections:
          - title: ModelSimSimulator Requirements
            requirements:
              - id: VHDLTest-Simulators-ModelSimSimulator-Support
                title: VHDLTest shall support the ModelSim simulator.
                justification: |
                  ModelSim is an industry-standard commercial VHDL simulator widely used in
                  professional FPGA and ASIC development. Support for ModelSim is critical for
                  enterprise users and teams with existing ModelSim-based workflows.
                tests:
                  - ModelSimSimulator_SimulatorName_ReturnsModelSim

              - id: VHDLTest-Simulators-ModelSimSimulator-Compile
                title: ModelSimSimulator shall classify ModelSim compilation output lines by severity.
                justification: |
                  Accurate classification of compilation output enables VHDLTest to detect
                  errors during the vcom analysis phase and report them clearly to the user.
                tests:
                  - ModelSimSimulator_CompileProcessor_CleanOutput_ReturnsTextResult
                  - ModelSimSimulator_CompileProcessor_ErrorOutput_ReturnsErrorResult

              - id: VHDLTest-Simulators-ModelSimSimulator-Test
                title: ModelSimSimulator shall classify ModelSim simulation output lines by severity.
                justification: |
                  Accurate classification of simulation output enables VHDLTest to detect pass,
                  warning, and error conditions during vsim execution and reflect them in the
                  test report.
                tests:
                  - ModelSimSimulator_TestProcessor_CleanOutput_ReturnsTextResult
                  - ModelSimSimulator_TestProcessor_InfoOutput_ReturnsInfoResult
                  - ModelSimSimulator_TestProcessor_WarningOutput_ReturnsWarningResult
                  - ModelSimSimulator_TestProcessor_ErrorOutput_ReturnsErrorResult
                  - ModelSimSimulator_TestProcessor_FailureOutput_ReturnsErrorResult

              - id: VHDLTest-Simulators-ModelSimSimulator-Unavailable
                title: >-
                  When ModelSim is not available, VHDLTest shall report that the ModelSim
                  simulator is not available when compile or test is invoked.
                justification: |
                  Clear error reporting when the simulator is not installed prevents silent
                  failures and gives users an actionable message when the simulator binary
                  cannot be located.
                tests:
                  - ModelSimSimulator_Compile_SimulatorNotAvailable_ThrowsInvalidOperationException
                  - ModelSimSimulator_Test_SimulatorNotAvailable_ThrowsInvalidOperationException

              - id: VHDLTest-Simulators-ModelSimSimulator-FindPath
                title: >-
                  ModelSim Simulator shall locate the ModelSim installation directory, respecting
                  the VHDLTEST_MODELSIM_PATH environment variable override when set.
                justification: |
                  Reliable path discovery ensures VHDLTest can locate ModelSim across different
                  installation layouts and environments. The VHDLTEST_MODELSIM_PATH environment
                  variable override enables CI pipelines and non-standard installations to specify
                  the ModelSim path explicitly without modifying PATH. PATH-based discovery is
                  verified in CI with ModelSim installed; the env-var override path is covered by
                  a unit test.
                tests:
                  - ModelSimSimulator_FindPath_WithEnvVar_ReturnsEnvVarValue
                  - ModelSimSimulator_FindPath_WithoutEnvVar_ReturnsNullOrPath

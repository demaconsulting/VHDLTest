---
sections:
  - title: VHDLTest Requirements
    sections:
      - title: Simulators Requirements
        requirements:
          - id: VHDLTest-Simulators-Factory-Select
            title: The Simulators subsystem shall provide selection of a simulator instance by name.
            justification: |
              A factory pattern for simulator selection decouples test execution from the
              concrete simulator implementation. Verifying that the factory correctly selects
              a simulator by name ensures the subsystem interface contract is correct.
            tests:
              - SimulatorsSubsystem_GetSimulatorAndProcessCompileOutput_WithErrorOutput_ClassifiesAsError
              - SimulatorsSubsystem_GetSimulatorByName_WithUnknownName_ReturnsNull
            children:
              - VHDLTest-Simulators-Simulator-Interface
              - VHDLTest-Simulators-SimulatorFactory-Get
              - VHDLTest-Simulators-SimulatorFactory-Unknown
              - VHDLTest-Simulators-SimulatorFactory-AutoSelect
              - VHDLTest-Simulators-GhdlSimulator-Support
              - VHDLTest-Simulators-NvcSimulator-Support
              - VHDLTest-Simulators-ModelSimSimulator-Support
              - VHDLTest-Simulators-QuestaSimSimulator-Support
              - VHDLTest-Simulators-VivadoSimulator-Support
              - VHDLTest-Simulators-ActiveHdlSimulator-Support
              - VHDLTest-Simulators-MockSimulator-Support
              - VHDLTest-Simulators-GhdlSimulator-Unavailable
              - VHDLTest-Simulators-NvcSimulator-Unavailable
              - VHDLTest-Simulators-ModelSimSimulator-Unavailable
              - VHDLTest-Simulators-QuestaSimSimulator-Unavailable
              - VHDLTest-Simulators-VivadoSimulator-Unavailable
              - VHDLTest-Simulators-ActiveHdlSimulator-Unavailable

          - id: VHDLTest-Simulators-Factory-Classify
            title: The Simulators subsystem shall classify simulator output lines into diagnostic severity categories.
            justification: |
              Verifying that the factory and simulator processors work together end-to-end
              ensures the subsystem interfaces are correct and output classification functions
              as designed for each supported simulator.
            tests:
              - SimulatorsSubsystem_GetSimulatorAndProcessCompileOutput_WithErrorOutput_ClassifiesAsError
              - SimulatorsSubsystem_ProcessOutput_NvcWithCleanOutput_ClassifiesAsText
              - SimulatorsSubsystem_ProcessOutput_GhdlWithWarningOutput_ClassifiesAsWarning
              - SimulatorsSubsystem_ProcessOutput_NvcWithInfoOutput_ClassifiesAsInfo
            children:
              - VHDLTest-Simulators-GhdlSimulator-Compile
              - VHDLTest-Simulators-GhdlSimulator-Test
              - VHDLTest-Simulators-NvcSimulator-Compile
              - VHDLTest-Simulators-NvcSimulator-Test
              - VHDLTest-Simulators-ModelSimSimulator-Compile
              - VHDLTest-Simulators-ModelSimSimulator-Test
              - VHDLTest-Simulators-QuestaSimSimulator-Compile
              - VHDLTest-Simulators-QuestaSimSimulator-Test
              - VHDLTest-Simulators-VivadoSimulator-Compile
              - VHDLTest-Simulators-VivadoSimulator-Test
              - VHDLTest-Simulators-ActiveHdlSimulator-Compile
              - VHDLTest-Simulators-ActiveHdlSimulator-Test
              - VHDLTest-Simulators-MockSimulator-Compile
              - VHDLTest-Simulators-MockSimulator-Test

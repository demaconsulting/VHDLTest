---
sections:
  - title: VHDLTest Requirements
    sections:
      - title: Cli Requirements
        sections:
          - title: Context Requirements
            requirements:
              - id: VHDLTest-Cli-Context-Parse
                title: The Context class shall parse all supported command-line flags and arguments.
                justification: |
                  Comprehensive flag parsing ensures all command-line options are correctly interpreted
                  and stored as typed properties, providing a reliable interface between the CLI and
                  application logic.
                tests:
                  - Context_Create_NoArguments_ReturnsDefaultContext
                  - Context_Create_WithConfigFile_SetsConfigFile
                  - Context_Create_WithLongConfigAlias_SetsConfigFile
                  - Context_Create_WithResultsFile_SetsResultsFile
                  - Context_Create_WithResultAlias_SetsResultsFile
                  - Context_Create_WithResultsAlias_SetsResultsFile
                  - Context_Create_WithSimulator_SetsSimulator
                  - Context_Create_WithSimulatorAlias_SetsSimulator
                  - Context_Create_WithVerbose_SetsVerboseFlag
                  - Context_Create_WithExitZero_SetsExitZeroFlag
                  - Context_Create_WithShortExitZeroAlias_SetsExitZeroFlag
                  - Context_Create_WithValidate_SetsValidateFlag
                  - Context_Create_WithCustomTest_SetsCustomTest
                  - Context_Create_WithCustomTests_SetsCustomTests
                  - Context_Create_WithVersionFlag_SetsVersionFlag
                  - Context_Create_WithShortVersionFlag_SetsVersionFlag
                  - Context_Create_WithHelpFlag_SetsHelpFlag
                  - Context_Create_WithShortHelpFlag_SetsHelpFlag
                  - Context_Create_WithQuestionHelpFlag_SetsHelpFlag
                  - Context_Create_WithSilentFlag_SetsSilentFlag
                  - Context_Create_WithLogOption_WritesToLogFile

              - id: VHDLTest-Cli-Context-NullArgs
                title: Context shall throw ArgumentNullException when the args argument to Create is null.
                justification: |
                  Throwing ArgumentNullException for a null args array gives callers a clear
                  programmer-error signal and prevents cryptic null-reference failures deeper in
                  the argument-parsing loop. This guard is implemented via
                  ArgumentNullException.ThrowIfNull and is verified by a dedicated test.
                tests:
                  - Context_Create_NullArguments_ThrowsArgumentNullException

              - id: VHDLTest-Cli-Context-Error
                title: The Context class shall throw InvalidOperationException for unrecognized arguments.
                justification: |
                  Throwing a typed exception for unrecognized arguments allows the application entry
                  point to provide a clear error message and prevents silent misconfiguration.
                tests:
                  - Context_Create_UnknownArgument_ThrowsInvalidOperationException
                  - Context_Create_MissingConfigValue_ThrowsInvalidOperationException
                  - Context_Create_MissingResultsValue_ThrowsInvalidOperationException
                  - Context_Create_MissingSimulatorValue_ThrowsInvalidOperationException
                  - Context_Create_MissingLogValue_ThrowsInvalidOperationException
                  - Context_Create_MissingDepthValue_ThrowsInvalidOperationException

              - id: VHDLTest-Cli-Context-Depth-Parse
                title: Context shall parse the --depth option and set the Depth property to the supplied integer value.
                justification: |
                  The --depth option controls the heading-level depth of validation report output.
                  Parsing the value into the Depth property ensures that downstream report generation
                  receives the user-specified heading level.
                tests:
                  - Context_Create_WithDepth_SetsDepth

              - id: VHDLTest-Cli-Context-Depth-Validate
                title: Context shall throw InvalidOperationException when the --depth option value is not an integer or is less than 1.
                justification: |
                  Validating the depth value at parse time ensures that downstream report generation
                  always receives a positive integer, preventing cryptic failures during report
                  rendering.
                tests:
                  - Context_Create_WithInvalidDepth_ThrowsInvalidOperationException
                  - Context_Create_WithZeroDepth_ThrowsInvalidOperationException
                  - Context_Create_WithNegativeDepth_ThrowsInvalidOperationException

              - id: VHDLTest-Cli-Context-Write
                title: Context shall write a message without a line terminator to the console, suppressed when silent mode is active.
                justification: |
                  Gating console write on the silent flag ensures that CI pipeline logs remain
                  clean when silent mode is active, while interactive users still see output.
                tests:
                  - Context_Write_NonSilentMode_WritesToConsole
                  - Context_Write_SilentMode_SuppressesConsole

              - id: VHDLTest-Cli-Context-Write-Log
                title: Context shall write a message without a line terminator unconditionally to the log file when configured.
                justification: |
                  The log file must always capture output regardless of silent mode so that CI
                  systems retain complete diagnostic records even when console output is
                  suppressed.
                tests:
                  - Context_Write_WithLogFile_WritesToLog
                  - Context_Write_SilentMode_WritesToLogFile

              - id: VHDLTest-Cli-Context-WriteLine
                title: Context shall write a message with a line terminator to the console, suppressed when silent mode is active.
                justification: |
                  The majority of VHDLTest output is line-oriented; gating console WriteLine on
                  the silent flag ensures that CI pipeline logs remain clean when silent mode is
                  active, while interactive users still see output.
                tests:
                  - Context_WriteLine_NonSilentMode_WritesToConsole
                  - Context_WriteLine_SilentMode_SuppressesConsole

              - id: VHDLTest-Cli-Context-WriteLine-Log
                title: Context shall write a message with a line terminator unconditionally to the log file when configured.
                justification: |
                  The log file must always capture line-terminated output regardless of silent
                  mode so that CI systems retain complete diagnostic records even when console
                  output is suppressed.
                tests:
                  - Context_Create_WithLogOption_WritesToLogFile
                  - Context_WriteLine_SilentMode_WritesToLogFile

              - id: VHDLTest-Cli-Context-WriteVerboseLine
                title: Context shall write a verbose message with a line terminator only when verbose mode is active, suppressed on the console when silent mode is active.
                justification: |
                  Verbose output must be gated on the verbose flag so that normal invocations
                  produce concise output while diagnostic invocations produce detailed traces,
                  supporting both CI use and developer debugging. Console output is additionally
                  suppressed when silent mode is active, ensuring silent mode applies uniformly
                  to all output channels.
                tests:
                  - Context_WriteVerboseLine_VerboseMode_WritesToLog
                  - Context_WriteVerboseLine_NonVerboseMode_ProducesNoOutput
                  - Context_WriteVerboseLine_NonSilentVerboseMode_WritesToConsole
                  - Context_WriteVerboseLine_SilentVerboseMode_SuppressesConsole

              - id: VHDLTest-Cli-Context-WriteError-Message
                title: Context shall write the provided error message to the console when WriteError is called, suppressed when silent mode is active.
                justification: |
                  Writing the error text to the console ensures users see the failure information.
                  Console output is suppressed by the silent flag so CI pipelines can mute
                  non-critical output without losing error visibility in the log file.
                tests:
                  - Context_WriteError_NonSilentMode_WritesToConsole
                  - Context_WriteError_SilentMode_SuppressesConsole

              - id: VHDLTest-Cli-Context-WriteError-Counter
                title: Context shall increment the error counter each time an error is reported.
                justification: |
                  The error counter drives the process exit code, enabling callers to detect
                  failure without parsing individual messages.
                tests:
                  - Context_WriteError_WithMessage_IncrementsErrors

              - id: VHDLTest-Cli-Context-WriteError-Silent
                title: Context shall write error output to configured log outputs regardless of silent mode.
                justification: |
                  Error messages must still reach configured log outputs when silent mode suppresses
                  console output so that CI systems retain complete failure diagnostics.
                tests:
                  - Context_WriteError_SilentMode_WritesToLogFile

              - id: VHDLTest-Cli-Context-ExitCode
                title: Context shall expose an ExitCode property that returns 0 when no errors have been reported and a non-zero value when errors have been reported.
                justification: |
                  Exposing a computed ExitCode property allows Program.Main to set
                  Environment.ExitCode from a single source of truth, and allows tests to verify
                  process exit behavior without capturing Environment.ExitCode directly.
                tests:
                  - Context_ExitCode_NoErrors_ReturnsZero
                  - Context_WriteError_WithMessage_IncrementsErrors

              - id: VHDLTest-Cli-Context-Dispose
                title: Context shall flush and close any open log-file writer when the context is disposed.
                justification: |
                  Deterministic resource release for the log-file writer ensures complete and
                  unfragmented log output even when the caller exits early or in error, preventing
                  data loss or file-locking issues in test and CI environments.
                tests:
                  - Context_Create_WithLogOption_WritesToLogFile

              - id: VHDLTest-Cli-Context-LogFile
                title: Context shall write all output to the specified log file when the --log option is provided.
                justification: |
                  Writing all output to a log file enables CI pipelines and automated tools to
                  capture VHDLTest output without relying on console redirection, which may not
                  be available or reliable in all execution environments.
                tests:
                  - Context_Create_WithLogOption_WritesToLogFile
                  - Context_Create_WithLongLogOption_WritesToLogFile

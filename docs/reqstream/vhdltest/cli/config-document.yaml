---
sections:
  - title: VHDLTest Requirements
    sections:
      - title: Cli Requirements
        sections:
          - title: ConfigDocument Requirements
            requirements:
              - id: VHDLTest-Cli-ConfigDoc-Read
                title: The ConfigDocument class shall deserialize a YAML configuration file.
                justification: |
                  Deserializing the YAML configuration into a typed object ensures configuration
                  values are validated at load time and provides a clear interface for downstream
                  code to access test parameters.
                tests:
                  - ConfigDocument_ReadFile_ValidFile_ReadsSuccessfully

              - id: VHDLTest-Cli-ConfigDoc-Missing
                title: The ConfigDocument class shall throw FileNotFoundException for missing files.
                justification: |
                  Throwing a descriptive exception for missing configuration files allows the
                  application to surface a clear error message to the user rather than a
                  cryptic null-reference error.
                tests:
                  - ConfigDocument_ReadFile_MissingFile_ThrowsFileNotFoundException

              - id: VHDLTest-Cli-ConfigDoc-Null
                title: The ConfigDocument class shall throw InvalidOperationException when the configuration file deserializes to null.
                justification: |
                  Throwing a descriptive exception when deserialization yields null ensures the application
                  surfaces a clear error rather than silently returning a null configuration instance,
                  which would cause a cryptic null reference error downstream in CI pipelines.
                tests:
                  - ConfigDocument_ReadFile_InvalidContent_ThrowsInvalidOperationException

              - id: VHDLTest-Cli-ConfigDoc-Malformed
                title: The ConfigDocument class shall throw InvalidOperationException when the configuration file contains malformed YAML that cannot be deserialized.
                justification: |
                  A predictable exception type allows CLI pipeline error handling to be consistent
                  regardless of the YAML library used.
                tests:
                  - ConfigDocument_ReadFile_MalformedContent_ThrowsInvalidOperationException

              - id: VHDLTest-Cli-ConfigDoc-Defaults
                title: The ConfigDocument class shall return empty arrays for Files and Tests when those keys are absent from the YAML configuration file.
                justification: |
                  Defaulting Files and Tests to empty arrays when keys are absent prevents null
                  reference errors in downstream code that iterates over these collections, and
                  matches the defensive programming pattern used throughout the codebase for
                  optional configuration properties.
                tests:
                  - ConfigDocument_ReadFile_MissingKeys_ReturnsEmptyArrays

              - id: VHDLTest-Cli-ConfigDoc-ExplicitNull
                title: The ConfigDocument class shall return empty arrays for Files and Tests when those keys are explicitly set to null in the YAML configuration file.
                justification: |
                  Treating explicit null values the same as absent keys prevents null reference
                  errors in downstream code that iterates over these collections, ensuring
                  consistent behavior regardless of whether a YAML author omits a key or sets
                  it to null.
                tests:
                  - ConfigDocument_ReadFile_ExplicitNullLists_ReturnsEmptyArrays

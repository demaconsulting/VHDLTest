---
sections:
  - title: VHDLTest Requirements
    sections:
      - title: Command-Line Interface
        requirements:
          - id: VHDLTest-Cmd-Usage
            title: VHDLTest shall display usage information when run without arguments.
            justification: |
              Provides immediate guidance to users who are unfamiliar with the tool or have
              forgotten the command syntax. This improves user experience by making the tool
              self-documenting and reduces the need for external documentation lookups.
            tests:
              - IntegrationTest_NoArguments_DisplaysUsageAndReturnsError
            children:
              - VHDLTest-Program-NoArgs
              - VHDLTest-Program-NoConfig

          - id: VHDLTest-Cmd-Version
            title: VHDLTest shall display version information when requested.
            justification: |
              Enables users to verify which version of VHDLTest is installed, which is critical
              for troubleshooting, compatibility checks, and ensuring reproducible builds. This
              is a standard practice for CLI tools and supports issue reporting.
            tests:
              - IntegrationTest_VersionShortFlag_DisplaysVersionAndReturnsSuccess
              - IntegrationTest_VersionLongFlag_DisplaysVersionAndReturnsSuccess
            children:
              - VHDLTest-Program-Version

          - id: VHDLTest-Cmd-Help
            title: VHDLTest shall display help information when requested.
            justification: |
              Provides comprehensive command-line documentation directly within the tool,
              allowing users to quickly reference available options and syntax without
              consulting external documentation. Supports multiple help flags for user convenience.
            tests:
              - IntegrationTest_HelpShortFlag_DisplaysUsageAndReturnsSuccess
              - IntegrationTest_HelpQuestionFlag_DisplaysUsageAndReturnsSuccess
              - IntegrationTest_HelpLongFlag_DisplaysUsageAndReturnsSuccess
            children:
              - VHDLTest-Program-Help

          - id: VHDLTest-Cmd-Verbose
            title: VHDLTest shall support a --verbose option that enables detailed output.
            justification: |
              Detailed output is essential for debugging failed test runs and understanding
              simulator behavior. Verbose mode gives developers the full simulator output
              and diagnostic information needed to diagnose issues without requiring manual
              simulator invocation.
            tests:
              - IntegrationTest_VerboseFlag_DisplaysDetailedOutput
            children:
              - VHDLTest-Cli-Context-WriteVerboseLine

          - id: VHDLTest-Cmd-Silent
            title: VHDLTest shall support a --silent option that suppresses non-essential output.
            justification: |
              Silent mode keeps CI/CD pipeline logs clean by suppressing informational messages
              while retaining error output. This is important for large pipelines where noise
              in log output increases review time and obscures actionable failures.
            tests:
              - IntegrationTest_SilentFlag_SuppressesOutput
            children:
              - VHDLTest-Cli-Context-Write
              - VHDLTest-Cli-Context-WriteLine

          - id: VHDLTest-Cmd-Log
            title: VHDLTest shall support a --log option that writes output to the specified log file.
            justification: |
              Persisting output to a log file allows post-run analysis, archiving, and audit
              trails for compliance workflows. It decouples diagnostic information from the
              interactive terminal session.
            tests:
              - IntegrationTest_LogFlag_WritesLogFile
            children:
              - VHDLTest-Cli-Context-LogFile

      - title: Test Execution
        requirements:
          - id: VHDLTest-Test-Success
            title: VHDLTest shall execute VHDL test benches and return zero exit code on success.
            justification: |
              Enables integration with CI/CD pipelines and build systems that rely on exit
              codes to determine test success or failure. A zero exit code is the standard
              convention for successful command execution in Unix-like systems.
            tests:
              - IntegrationTest_TestsPassed_ReturnsZeroExitCode
            children:
              - VHDLTest-Cli-Pipeline
              - VHDLTest-Simulators-Factory-Select
              - VHDLTest-Run-Execute
              - VHDLTest-Results-Collect
              - VHDLTest-Results-Save

          - id: VHDLTest-Test-CompileError
            title: VHDLTest shall return non-zero exit code when compilation fails.
            justification: |
              Allows CI/CD systems and automated workflows to detect compilation errors and
              halt the build process appropriately. This prevents invalid or incomplete designs
              from progressing through the development pipeline.
            tests:
              - IntegrationTest_CompileError_ReturnsNonZeroExitCode
            children:
              - VHDLTest-Simulators-Factory-Select
              - VHDLTest-Run-Execute

          - id: VHDLTest-Test-TestError
            title: VHDLTest shall return non-zero exit code when tests fail.
            justification: |
              Enables automated test environments to detect test failures and take appropriate
              action (e.g., failing the build, sending notifications). This is essential for
              continuous integration and maintaining code quality.
            tests:
              - IntegrationTest_TestExecutionError_ReturnsNonZeroExitCode
            children:
              - VHDLTest-Simulators-Factory-Select
              - VHDLTest-Run-Execute

          - id: VHDLTest-Test-Exit0
            title: VHDLTest shall support exit-0 mode to always return zero exit code.
            justification: |
              Provides flexibility for scenarios where test results need to be collected and
              analyzed without failing the build process. Useful for generating test reports
              in pipelines where failures are handled by separate post-processing steps.
            tests:
              - IntegrationTest_TestExecutionErrorWithExit0_ReturnsZeroExitCode
            children:
              - VHDLTest-Cli-Pipeline

          - id: VHDLTest-Config-Load
            title: VHDLTest shall load test configuration from the YAML file specified by the --config (-c) option.
            justification: |
              A YAML configuration file is the primary mechanism for specifying which tests to run
              and how the simulator should be configured. Requiring the path via a named option
              makes the invocation explicit and consistent with the published command-line interface.
            tests:
              - IntegrationTest_TestsPassed_ReturnsZeroExitCode
            children:
              - VHDLTest-Cli-Pipeline
              - VHDLTest-Cli-ConfigDoc-Read
              - VHDLTest-Cli-Options-Parse

          - id: VHDLTest-Results-TRX
            title: VHDLTest shall write test results in TRX format to the file specified by --results when the option is provided.
            justification: |
              TRX files are the standard test result format consumed by CI/CD platforms, coverage
              tools, and requirements traceability tools. Writing results to a file decouples
              result consumption from the tool's standard output stream and enables asynchronous
              processing.
            tests:
              - IntegrationTest_ResultsFlag_WritesTrxFile
            children:
              - VHDLTest-Results-TestResults-Trx

          - id: VHDLTest-Results-JUnit
            title: VHDLTest shall write test results in JUnit XML format to the file specified by --results when the option is provided with a .xml extension.
            justification: |
              JUnit XML is widely consumed by CI/CD platforms and test-reporting dashboards outside
              the .NET ecosystem. Supporting JUnit XML output allows VHDLTest to integrate with
              heterogeneous build pipelines and reporting infrastructure.
            tests:
              - IntegrationTest_ResultsFlag_WritesJUnitFile
            children:
              - VHDLTest-Results-TestResults-JUnit

          - id: VHDLTest-Simulator-Select
            title: VHDLTest shall support selection of the VHDL simulator via the --simulator (-s) option, accepting values ghdl, nvc, modelsim, questasim, vivado, and activehdl.
            justification: |
              Supporting multiple simulators allows VHDLTest to be used across diverse development
              environments and organizations that have standardized on different VHDL simulators.
              The explicit selection option ensures deterministic simulator choice in CI pipelines.
            tests:
              - IntegrationTest_TestsPassed_ReturnsZeroExitCode
            children:
              - VHDLTest-Simulators-Factory-Select

          - id: VHDLTest-Simulator-EnvPath
            title: VHDLTest shall support overriding the simulator executable path via environment variables (e.g., VHDLTEST_GHDL_PATH).
            justification: |
              Environment variable path overrides allow system administrators and CI environments
              to point VHDLTest at non-standard simulator installation locations without modifying
              configuration files or the system PATH, which may be locked down in managed environments.
            tests:
              - IntegrationTest_SimulatorEnvPath_OverridesPath
            children:
              - VHDLTest-Simulators-Factory-Select

      - title: Self-Validation
        requirements:
          - id: VHDLTest-Validate
            title: VHDLTest shall support a --validate option that verifies correct installation and reports results.
            justification: |
              A built-in self-validation mode allows users to confirm that VHDLTest is correctly
              installed and functioning after deployment, reducing support burden and enabling
              automated installation verification in provisioning scripts.
            tests:
              - SelfTest_Validate_MockSimulator_ReturnsSuccess
            children:
              - VHDLTest-Program-Validate
              - VHDLTest-SelfTest-Run

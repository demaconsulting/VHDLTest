---
sections:
  - title: VHDLTest Requirements
    sections:
      - title: SelfTest Requirements
        sections:
          - title: Validation Requirements
            requirements:
              - id: VHDLTest-SelfTest-Validation-Run
                title: The Validation class shall execute built-in VHDL test benches to verify correct operation.
                justification: |
                  Running built-in test benches during self-validation provides concrete evidence that
                  the simulator integration is working correctly in the user's environment, rather than
                  just checking that the tool starts up.
                tests:
                  - Validation_Run_MockSimulator_ReturnsSuccess

              - id: VHDLTest-SelfTest-Validation-Depth
                title: The Validation class shall support configurable report depth for embedded document output.
                justification: |
                  Configurable header depth in validation reports allows users to embed the validation
                  output in other documents with correct heading hierarchy, supporting compliance
                  documentation workflows.
                tests:
                  - Validation_Run_DepthParameter_RendersDepthHeadings

              - id: VHDLTest-SelfTest-Validation-SystemInfo
                title: The Validation class shall include OS and runtime information in the validation report.
                justification: |
                  Including system information in the validation report provides essential context for
                  diagnosing environment-specific issues and for compliance documentation.
                tests:
                  - Validation_Run_MockSimulator_IncludesOSVersionInReport

              - id: VHDLTest-SelfTest-Validation-Results
                title: The Validation class shall save results to a file when a results path is specified.
                justification: |
                  Saving validation results to a file enables integration with CI/CD pipelines and
                  provides a persistent record of validation outcomes for compliance documentation.
                tests:
                  - Validation_Run_ResultsFile_SavesResults

              - id: VHDLTest-SelfTest-Validation-InvalidSimulator-ExitCode
                title: The Validation class shall exit with a non-zero code when given an unrecognized simulator name.
                justification: |
                  If an unrecognized simulator name is provided, VHDLTest should fail gracefully
                  rather than throwing an unhandled exception, ensuring a good user experience
                  when the configuration is incorrect.
                tests:
                  - Validation_Run_InvalidSimulator_ReturnsFailure

              - id: VHDLTest-SelfTest-Validation-InvalidSimulator-ErrorMessage
                title: The Validation class shall emit a descriptive error message when given an unrecognized simulator name.
                justification: |
                  A descriptive error message when an unrecognized simulator name is provided
                  helps the user understand what went wrong and how to correct the configuration,
                  rather than leaving them with a bare non-zero exit code.
                tests:
                  - Validation_Run_InvalidSimulator_ReturnsFailure

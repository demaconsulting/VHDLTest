---
sections:
  - title: VHDLTest Requirements
    sections:
      - title: TestResults Unit
        requirements:
          - id: VHDLTest-TestResults-Save
            title: TestResults shall serialize test results to TRX and JUnit XML formats.
            justification: |
              Serializing results to industry-standard formats ensures VHDLTest can integrate
              with a wide range of CI/CD platforms and test reporting tools.
            tests:
              - TestResults_SaveResults_TrxFormat_SavesSuccessfully
              - TestResults_SaveResults_JUnitFormat_SavesSuccessfully

          - id: VHDLTest-TestResults-Summary
            title: TestResults shall provide pass and fail counts for summary reporting.
            justification: |
              Summary counts provide an at-a-glance view of test results, enabling quick
              identification of overall test health without reviewing individual results.
            tests:
              - TestResults_PassFail_Counts_AreCorrect

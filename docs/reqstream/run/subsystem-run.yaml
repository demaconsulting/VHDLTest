---
sections:
  - title: VHDLTest Requirements
    sections:
      - title: Run Subsystem
        requirements:
          - id: VHDLTest-Run-Execute
            title: VHDLTest shall execute simulator programs and capture their classified output.
            justification: |
              Executing the simulator as an external process and classifying its output allows
              VHDLTest to work with any command-line VHDL simulator without requiring
              programmatic integration.
            tests:
              - RunSubsystem_ExecuteRealProgram_WithClassificationRules_ProducesClassifiedRunResults
              - RunSubsystem_ExecuteRealProgram_WithErrorExitCode_ProducesErrorRunResults

---
sections:
  - title: OTS Software Requirements
    sections:
      - title: DictionaryMark Requirements
        requirements:
          - id: VHDLTest-OTS-DictionaryMark
            title: DictionaryMark shall enforce correct spelling in project documentation using a custom dictionary.
            justification: |
              DemaConsulting.DictionaryMark (v0.1.0-beta.1) checks documentation files against
              a configured dictionary, failing the build when unrecognized words are encountered.
              This maintains consistent terminology and catches typographical errors in design
              documents before they are formally reviewed.
            tags: [ots]
            tests:
              - DictionaryMark_BulletGeneration
              - DictionaryMark_TableGeneration
              - DictionaryMark_ConflictDetection
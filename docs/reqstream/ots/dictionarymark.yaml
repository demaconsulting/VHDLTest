---
sections:
  - title: OTS Software Requirements
    sections:
      - title: DictionaryMark Requirements
        requirements:
          - id: VHDLTest-OTS-DictionaryMark-Generate
            title: DictionaryMark shall generate approved word list dictionaries from bullet lists and table columns in documentation.
            justification: |
              DemaConsulting.DictionaryMark's bullet-list and table generation modes produce
              the word-list artifacts consumed by documentation, providing the approved word list
              that underpins the spelling enforcement workflow.
            tags: [ots]
            tests:
              - DictionaryMark_BulletGeneration
              - DictionaryMark_TableGeneration

          - id: VHDLTest-OTS-DictionaryMark-Detect
            title: DictionaryMark shall detect conflicting entries between dictionary sources and fail the build on any conflict.
            justification: |
              The conflict-detection mode ensures the configured dictionary is internally
              consistent, preventing ambiguous or duplicate entries from silently producing
              incorrect spell-check results.
            tags: [ots]
            tests:
              - DictionaryMark_ConflictDetection

          - id: VHDLTest-OTS-DictionaryMark-Enforce
            title: DictionaryMark shall enforce that documentation contains only words in the configured approved word list, rejecting any word not in the approved list and failing the build on a spelling violation.
            justification: |
              DemaConsulting.DictionaryMark's spelling enforcement capability is exercised
              through DictionaryMark's self-validation suite, which includes a dedicated
              spelling enforcement test case. The self-validation is invoked via
              `dotnet dictionarymark --validate --results` in the CI pipeline, and the
              resulting TRX file consumed by ReqStream provides traceability evidence that
              the enforcement capability is operational.
            tags: [ots]
            tests:
              - DictionaryMark_SpellingEnforcement
sections:
  - title: OTS Software Requirements
    sections:
      - title: PandocTool Requirements
        requirements:
          - id: VHDLTest-OTS-PandocTool
            title: PandocTool shall convert Markdown design documents into HTML for downstream processing.
            justification: |
              DemaConsulting.PandocTool (v3.9.0.2) wraps the Pandoc document converter and is
              used in the build pipeline to render Markdown design documentation into HTML
              as an intermediate step for PDF generation via WeasyprintTool. Correct HTML
              output from the design documents confirms the tool is functioning as required.
              The tool is exercised on every CI run; FileAssert-based output verification
              is planned once the generated file paths are stabilised.
            tags: [ots]
            tests: []

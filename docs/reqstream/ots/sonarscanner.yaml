sections:
  - title: OTS Software Requirements
    sections:
      - title: SonarScanner Requirements
        requirements:
          - id: VHDLTest-OTS-SonarScanner-Analyze
            title: dotnet-sonarscanner shall perform static code analysis of VHDLTest source code.
            justification: |
              dotnet-sonarscanner wraps the .NET build pipeline to collect code metrics,
              coverage data, and static analysis findings as part of the CI workflow,
              maintaining continuous code quality visibility for the VHDLTest project.
            tags: [ots]
            tests: []

          - id: VHDLTest-OTS-SonarScanner-Publish
            title: dotnet-sonarscanner shall publish analysis results to SonarCloud.
            justification: |
              Publishing analysis results to SonarCloud enables the development team to
              track code quality trends, receive alerts on quality degradation, and maintain
              a continuous quality monitoring record for the VHDLTest project. Issues
              surfaced by SonarCloud are tracked and resolved as part of the development
              workflow, maintaining code quality standards.
            tags: [ots]
            tests: []

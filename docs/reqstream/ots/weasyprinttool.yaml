---
sections:
  - title: OTS Software Requirements
    sections:
      - title: WeasyprintTool Requirements
        requirements:
          - id: VHDLTest-OTS-WeasyprintTool
            title: WeasyprintTool shall render HTML documentation into PDF release artifacts.
            justification: |
              DemaConsulting.WeasyprintTool wraps the WeasyPrint CSS-based PDF renderer
              and is used in the build pipeline to produce PDF versions of documentation
              for formal review and release archiving. Correct PDF output confirms the
              tool is functioning as required. The tool is exercised on every CI run
              across all eight document collections; FileAssert verifies the generated
              PDF files using Exists and content checks.
            tags: [ots]
            tests:
              - WeasyPrint_BuildNotesPdf
              - WeasyPrint_DesignPdf

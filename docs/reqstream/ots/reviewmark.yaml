---
sections:
  - title: OTS Software Requirements
    sections:
      - title: ReviewMark Requirements
        requirements:
          - id: VHDLTest-OTS-ReviewMark
            title: ReviewMark shall be integrated in the CI pipeline to report review coverage of all required source files.
            justification: |
              DemaConsulting.ReviewMark processes .reviewmark.yaml to verify that each
              file listed in a review-set has an associated review record in the evidence store.
              Enforcement mode (--enforce flag) requires a populated reviews branch with PDF evidence.
              This is planned but not yet active. Current CI usage reports coverage without enforcing it.
            tags: [ots]
            tests:
              - ReviewMark_CoverageReport

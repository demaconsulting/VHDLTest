---
sections:
  - title: OTS Software Requirements
    sections:
      - title: ReqStream Requirements
        requirements:
          - id: VHDLTest-OTS-ReqStream
            title: ReqStream shall enforce that every requirement is linked to passing test evidence.
            justification: |
              DemaConsulting.ReqStream processes requirements.yaml and the TRX test-result files to
              produce a requirements report, justifications document, and traceability matrix. When
              run with --enforce, it exits with a non-zero code if any requirement lacks test evidence,
              making unproven requirements a build-breaking condition.
            tags: [ots]
            tests:
              - ReqStream_EnforcementMode

          - id: VHDLTest-OTS-ReqStream-Lint
            title: ReqStream shall validate requirements file syntax and cross-references.
            justification: |
              dotnet reqstream --lint --requirements requirements.yaml validates that all
              requirement files are syntactically correct and that cross-references between
              requirement files resolve correctly. This is used in lint.ps1 and lint.sh as
              a development-time quality gate to catch malformed requirements before CI.
            tags: [ots]
            tests:
              - ReqStream_Lint

          - id: VHDLTest-OTS-ReqStream-RequirementsProcessing
            title: ReqStream shall read requirements.yaml and all referenced requirement files into a structured requirements model.
            justification: |
              DemaConsulting.ReqStream's requirements processing capability reads
              requirements.yaml and every file listed in its includes: list, producing the
              structured requirements model consumed by the report, justifications, matrix,
              and enforcement features described in docs/design/ots/reqstream.md.
            tags: [ots]
            tests:
              - ReqStream_RequirementsProcessing

          - id: VHDLTest-OTS-ReqStream-TraceMatrix
            title: ReqStream shall produce a traceability matrix mapping requirements to tests.
            justification: |
              dotnet reqstream --matrix docs/requirements_report/trace_matrix.md produces a
              markdown matrix mapping each requirement to its linked tests, used in the
              build-docs CI job to publish requirements traceability evidence.
            tags: [ots]
            tests:
              - ReqStream_TraceMatrix

          - id: VHDLTest-OTS-ReqStream-ReportExport
            title: ReqStream shall export the requirements and justifications documents to markdown files.
            justification: |
              dotnet reqstream --report docs/requirements_doc/requirements.md
              --justifications docs/requirements_doc/justifications.md exports the
              requirements and justifications documents used in the build-docs CI job's
              generated documentation set.
            tags: [ots]
            tests:
              - ReqStream_ReportExport

          - id: VHDLTest-OTS-ReqStream-TagsFiltering
            title: ReqStream shall restrict requirements processing to requirements matching a given tag filter.
            justification: |
              dotnet reqstream --filter <tags> restricts requirements export and enforcement
              to requirements whose tags: list intersects the given comma-separated tag set,
              documented as the tag-based filtering feature in reqstream-usage.md and used
              for selective per-tag requirements/justifications export.
            tags: [ots]
            tests:
              - ReqStream_TagsFiltering

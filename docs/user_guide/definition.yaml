---
# Pandoc document definition for VHDLTest User Guide

# Resource paths for finding files and templates
resource-path:
  - docs/user_guide
  - docs/template

# Input files in order (relative to resource-path)
input-files:
  - docs/user_guide/title.txt
  - docs/user_guide/introduction.md

# Template configuration
template: template.html

# Table of contents settings
table-of-contents: true

# Enable numbered sections
number-sections: true

# Standalone document
standalone: true

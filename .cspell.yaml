---
# Spell-Checking
#
# PURPOSE:
# - Maintain professional documentation and code quality
# - Catch spelling errors before publication
# - Support consistent technical terminology usage
# - Misspelled words should be fixed in the source
# - NEVER add a misspelled word to the 'words' list
# - PROPOSE only genuine technical terms/names as needed

version: "0.2"
language: en

# Project-specific technical terms and tool names
words:
  - activehdl
  - Aldec
  - alib
  - acom
  - Anson
  - ASIC
  - asim
  - buildmark
  - BuildMark
  - build_notes
  - buildnotes
  - camelcase
  - code_quality
  - code_review_plan
  - code_review_report
  - CodeQL
  - copilot
  - coverlet
  - cspell
  - csproj
  - dcterms
  - Dema
  - demaconsulting
  - dotnet
  - dorny
  - endsim
  - errorlevel
  - ghdl
  - gitattributes
  - ibiqlik
  - lifecycles
  - markdownlint
  - mingw
  - mcode
  - modelsim
  - mstest
  - msys
  - msystem
  - netanalyzers
  - nickg
  - nameof
  - nlog
  - nolog
  - nupkg
  - opencover
  - pandoc
  - pandoctool
  - PATHEXT
  - Questa
  - QuestaSim
  - Qube
  - reqstream
  - ReqStream
  - requirements_doc
  - requirements_report
  - reviewmark
  - ReviewMark
  - runall
  - Sarif
  - SarifMark
  - sarifmark
  - sbom
  - SBOM
  - screencasts
  - setlocal
  - slnx
  - snupkg
  - sonarcloud
  - SonarQube
  - sonarscanner
  - spdx
  - testbench
  - testbenches
  - trace_matrix
  - tracematrix
  - thirdparty
  - trx
  - venv
  - vcom
  - VHDL
  - vhdl
  - vhdltest
  - vlib
  - vivado
  - vsim
  - vsimsa
  - Weasyprint
  - weasyprinttool
  - worklib
  - xelab
  - Xilinx
  - xvhdl
  - yaml
  - yamllint

# Exclude common build artifacts, dependencies, and vendored third-party code
ignorePaths:
  - "**/.git/**"
  - "**/node_modules/**"
  - "**/.venv/**"
  - "**/thirdparty/**"
  - "**/third-party/**"
  - "**/3rd-party/**"
  - "**/AGENT_REPORT_*.md"
  - "**/bin/**"
  - "**/obj/**"
  - "**/artifacts/**"
  - package-lock.json
